  { id: "c1", name: "Hôtel Le Grand Paris", city: "Paris 8ème", stars: 5, phone: "+33 1 42 65 32 10", email: "paris@demo.com", pw: "hotel" },
  { id: "c2", name: "Hôtel Riviera Nice", city: "Nice", stars: 4, phone: "+33 4 93 87 12 34", email: "nice@demo.com", pw: "hotel" },
  { id: "c3", name: "Hôtel Lumière Lyon", city: "Lyon", stars: 4, phone: "+33 4 78 42 56 78", email: "lyon@demo.com", pw: "hotel" },

const P0 = [
  { id: "pr01", cid: "c1", title: "Redémarrer Opera PMS", cat: "Problème Opera", pinned: true, files: [], content: "Étapes pour redémarrer Opera PMS :\n1. Fermez toutes les fenêtres Opera ouvertes\n2. Ouvrez le Gestionnaire des tâches (Ctrl + Alt + Suppr)\n3. Onglet \"Processus\" → cherchez \"Opera.exe\"\n4. Clic droit → Terminer la tâche\n5. Attendez 30 secondes puis relancez depuis le raccourci bureau\n\n⚠️ Si le problème persiste, contactez le support." },

  const [email, setEmail] = useState("");
  const [pw, setPw] = useState("");
  const [loginErr, setLoginErr] = useState("");
  const [showCreds, setShowCreds] = useState(false);

  const [search, setSearch] = useState("");
  const [selId, setSelId] = useState(null);
  const [procs, setProcs] = useState(P0);
  const [clients, setClients] = useState(CLIENTS0);
  const [editCid, setEditCid] = useState("c1");
  const [showProcForm, setShowProcForm] = useState(false);

      const raw2 = localStorage.getItem(CLIENTS_STORAGE_KEY);
      if (raw2) setClients(JSON.parse(raw2));

      saveClients([...clients, { id: newId, ...clientForm }]);
      setEditCid(newId);
    }
    setShowClientForm(false);

    saveClients(clients.filter(c => c.id !== id));
    saveProcs(procs.filter(p => p.cid !== id));

  const mailtoLink = `mailto:${SUPPORT_EMAIL}?subject=${mailSubject}&body=${mailBody}`;

  const handleSupportFilesAdd = (fileList) => {
    Array.from(fileList).forEach(f => {
      const reader = new FileReader();
      reader.onload = () => {
        setSupportForm(prev => ({ ...prev, files: [...prev.files, { name: f.name, dataUrl: reader.result, size: f.size }] }));
      };
      reader.readAsDataURL(f);
    });
  };
  const removeSupportFile = (idx) => setSupportForm(prev => ({ ...prev, files: prev.files.filter((_, i) => i !== idx) }));

  const buildSupportSubjectBody = () => {
    const subject = `[${supportForm.prio}] ${client ? client.name : ""} — ${supportForm.cat}`;
    const bodyText =
      `Hôtel : ${client ? client.name : ""}\n` +
      `Contact : ${supportForm.name} (${supportForm.role})\n` +
      `Email pro : ${supportForm.contactEmail || "-"}\n` +
      `Téléphone : ${supportForm.phone || "-"}\n` +
      `Catégorie : ${supportForm.cat}\n` +
      `Priorité : ${supportForm.prio}\n\n` +
      `Message :\n${supportForm.message}`;
    return { subject, bodyText };
  };

  const fallbackToMailto = () => {
    const { subject, bodyText } = buildSupportSubjectBody();
    const note = supportForm.files.length > 0 ? "\n\n⚠️ Pièces jointes non incluses (mailto ne le permet pas) — merci de les joindre manuellement avant l'envoi." : "";
    window.location.href = `mailto:${SUPPORT_EMAIL}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(bodyText + note)}`;
  };

  const submitSupportForm = async () => {
    if (!supportForm.name.trim() || !supportForm.message.trim()) return;
    setSupportError("");
    const { subject, bodyText } = buildSupportSubjectBody();

    if (!EMAIL_API_URL || EMAIL_API_URL.includes("VOTRE-WORKER")) {
      // Pas encore de backend configuré : on utilise mailto en repli (sans pièces jointes)
      fallbackToMailto();
      setSupportSent(true);
      return;
    }

    setSupportSending(true);
    try {
      const res = await fetch(EMAIL_API_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          to: SUPPORT_EMAIL,
          subject,
          text: bodyText,
          replyTo: supportForm.contactEmail || undefined,
          attachments: supportForm.files.map(f => ({ filename: f.name, content: f.dataUrl.split(",")[1] }))
        })
      });
      if (!res.ok) throw new Error("Échec de l'envoi (" + res.status + ")");
      setSupportSent(true);
    } catch (e) {
      setSupportError("L'envoi automatique a échoué. Ouverture de votre messagerie en repli (sans pièces jointes).");
      fallbackToMailto();
      setSupportSent(true);
    } finally {
      setSupportSending(false);
    }
  };

  const handleFilesAdd = (fileList) => {
    const arr = Array.from(fileList);
    arr.forEach(f => {
      const reader = new FileReader();
      reader.onload = () => {
        setProcForm(prev => ({ ...prev, files: [...prev.files, { name: f.name, dataUrl: reader.result, size: f.size }] }));
      };
      reader.readAsDataURL(f);
    });
  };

  const removeFormFile = (idx) => setProcForm(prev => ({ ...prev, files: prev.files.filter((_, i) => i !== idx) }));

  const openEditForm = (p) => {
    setEditingId(p.id);
    setProcForm({ title: p.title, cat: p.cat, content: p.content, pinned: !!p.pinned, files: p.files || [] });
    setShowProcForm(true);
  };
  const openNewForm = () => {
    setEditingId(null);
    setProcForm({ title: "", cat: CATS[0], content: "", pinned: false, files: [] });
    setShowProcForm(true);
  };
  const submitProcForm = () => {
    if (!procForm.title.trim() || !procForm.content.trim()) return;
    if (editingId) {
      saveProcs(procs.map(p => p.id === editingId ? { ...p, ...procForm } : p));
    } else {
      saveProcs([...procs, { id: "pr" + Date.now(), cid: editCid, ...procForm }]);

    setShowProcForm(false);

  const deleteProc = (id) => { if (selId === id) go("proc-admin"); saveProcs(procs.filter(p => p.id !== id)); };

    const doLogin = () => {
      if (email === ADMIN_USER.email && pw === ADMIN_USER.pw) { setUser(ADMIN_USER); setLoginErr(""); setPage("proc-admin"); return; }
      const c = clients.find(x => x.email === email && x.pw === pw);
      if (c) { setUser({ id: c.id, email: c.email, pw: c.pw, role: "client", cid: c.id, name: c.name }); setLoginErr(""); setPage("knowledge"); return; }
      setLoginErr("Email ou mot de passe incorrect.");
    };
    return React.createElement('div', { style: { minHeight: "100vh", background: SB, display: "flex", alignItems: "center", justifyContent: "center", padding: 24, fontFamily: "system-ui,-apple-system,sans-serif" } },
      React.createElement('div', { style: { width: 420, maxWidth: "100%" } },
        React.createElement('div', { style: { textAlign: "center", marginBottom: 28 } },
          React.createElement('div', { style: { display: "inline-flex", alignItems: "center", marginBottom: 10 } },
            React.createElement('img', { src: "https://www.dsihotel.com/dsi-logo-gold.png", alt: "DSI Hotel", style: { height: 64 } })
          ),
          React.createElement('div', { style: { color: "rgba(255,255,255,.45)", fontSize: 13 } }, "Intranet Procédures & Support")
        ),
        React.createElement('div', { style: { background: "rgba(255,255,255,.05)", borderRadius: 14, padding: 28, border: `1px solid ${G}30` } },
          React.createElement('div', { style: { marginBottom: 14 } },
            React.createElement('label', { style: { display: "block", color: "rgba(255,255,255,.6)", fontSize: 11, letterSpacing: "1px", marginBottom: 5 } }, "ADRESSE EMAIL"),
            React.createElement('input', { value: email, onChange: e => { setEmail(e.target.value); setLoginErr(""); }, onKeyDown: e => e.key === "Enter" && doLogin(), placeholder: "votre@email.com", style: { width: "100%", padding: "10px 13px", background: "rgba(255,255,255,.08)", border: `1px solid ${G}35`, borderRadius: 8, color: "white", fontSize: 14, outline: "none" } })
          ),
          React.createElement('div', { style: { marginBottom: 18 } },
            React.createElement('label', { style: { display: "block", color: "rgba(255,255,255,.6)", fontSize: 11, letterSpacing: "1px", marginBottom: 5 } }, "MOT DE PASSE"),
            React.createElement('input', { type: "password", value: pw, onChange: e => { setPw(e.target.value); setLoginErr(""); }, onKeyDown: e => e.key === "Enter" && doLogin(), placeholder: "••••••••", style: { width: "100%", padding: "10px 13px", background: "rgba(255,255,255,.08)", border: `1px solid ${G}35`, borderRadius: 8, color: "white", fontSize: 14, outline: "none" } })

        ),
        React.createElement('div', { style: { marginTop: 16, textAlign: "center" } },
          React.createElement('button', { onClick: () => setShowCreds(!showCreds), style: { background: "none", border: "none", color: "rgba(255,255,255,.3)", fontSize: 12, cursor: "pointer" } }, "↓ Accès de démonstration"),
          showCreds && React.createElement('div', { style: { marginTop: 10, background: "rgba(0,0,0,.35)", borderRadius: 8, padding: 14 } },
            [{ id: "adm", email: ADMIN_USER.email, pw: ADMIN_USER.pw, role: "admin", name: ADMIN_USER.name }, ...clients.map(c => ({ id: c.id, email: c.email, pw: c.pw, role: "client", name: c.name }))].map(u => React.createElement('div', { key: u.id, onClick: () => { setEmail(u.email); setPw(u.pw); }, style: { display: "flex", alignItems: "center", gap: 8, padding: "5px 6px", cursor: "pointer", borderRadius: 6, color: "rgba(255,255,255,.75)", fontSize: 12 } },
              React.createElement('span', null, u.role === "admin" ? "⚡" : "🏨"),
              React.createElement('span', { style: { flex: 1 } }, u.name),
              React.createElement('code', { style: { color: G, fontSize: 11 } }, u.email)

          )
        )
      )

  const nav = isAdmin
    ? [{ p: "client-admin", icon: "🏨", label: "Gérer les clients" }, { p: "proc-admin", icon: "📚", label: "Gérer les procédures" }]
    : [{ p: "knowledge", icon: "📖", label: "Procédures" }, { p: "contact", icon: "📧", label: "Contacter le support" }];

  let content = null;

  // CLIENT MANAGEMENT PAGE (admin)
  if (page === "client-admin" && isAdmin) {
    content = React.createElement('div', null,
      React.createElement('div', { style: { background: "#EBF8FF", border: "1px solid #BEE3F8", borderRadius: 8, padding: "10px 14px", marginBottom: 14, fontSize: 12, color: "#2B6CB0" } }, "ℹ️ Les clients créés ici sont sauvegardés dans ce navigateur uniquement (pas encore de base de données partagée)."),
      React.createElement('div', { style: { display: "flex", justifyContent: "flex-end", marginBottom: 14 } },
        React.createElement('button', { onClick: openNewClientForm, style: { display: "flex", alignItems: "center", gap: 5, background: G, border: "none", color: "#111", borderRadius: 7, fontSize: 12, fontWeight: 500, cursor: "pointer", padding: "8px 14px" } }, "+ Ajouter un client")
      ),
      showClientForm && React.createElement('div', { style: { background: "white", borderRadius: 10, border: `1px solid ${G}35`, padding: 18, marginBottom: 14 } },

        React.createElement('div', { style: { display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 10 } },
          React.createElement('div', null,
            React.createElement('label', { style: { display: "block", fontSize: 11, fontWeight: 500, color: "#555", marginBottom: 4 } }, "Nom de l'hôtel *"),
            React.createElement('input', { value: clientForm.name, onChange: e => setClientForm({ ...clientForm, name: e.target.value }), placeholder: "ex: Hôtel Le Grand Paris", style: { width: "100%", padding: "8px 10px", border: "1px solid #DDD", borderRadius: 6, fontSize: 12 } })
          ),
          React.createElement('div', null,
            React.createElement('label', { style: { display: "block", fontSize: 11, fontWeight: 500, color: "#555", marginBottom: 4 } }, "Ville"),
            React.createElement('input', { value: clientForm.city, onChange: e => setClientForm({ ...clientForm, city: e.target.value }), placeholder: "ex: Paris 8ème", style: { width: "100%", padding: "8px 10px", border: "1px solid #DDD", borderRadius: 6, fontSize: 12 } })
          )
        ),
        React.createElement('div', { style: { display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 10 } },
          React.createElement('div', null,
            React.createElement('label', { style: { display: "block", fontSize: 11, fontWeight: 500, color: "#555", marginBottom: 4 } }, "Étoiles"),
            React.createElement('select', { value: clientForm.stars, onChange: e => setClientForm({ ...clientForm, stars: parseInt(e.target.value, 10) }), style: { width: "100%", padding: "8px 10px", border: "1px solid #DDD", borderRadius: 6, fontSize: 12 } },
              [1, 2, 3, 4, 5].map(n => React.createElement('option', { key: n, value: n }, n + " ★"))

            React.createElement('input', { value: clientForm.phone, onChange: e => setClientForm({ ...clientForm, phone: e.target.value }), placeholder: "+33 1 XX XX XX XX", style: { width: "100%", padding: "8px 10px", border: "1px solid #DDD", borderRadius: 6, fontSize: 12 } })
          )
        ),
